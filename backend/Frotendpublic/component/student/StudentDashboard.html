<div class="mainarea">
    <button id="hamberg" class="hamberg">&#9776;</button>
<div class="profile-card">
    
        <div class="header-badge">
            <div class="badge-icon-bg">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Student Icon">
            </div>
            <div class="verified-label">
                <span class="check-icon">✓</span> Verified Student
            </div>
        </div>

        <h1 class="main-title">My Student Profile</h1>
        <p class="sub-title">My Student Details</p>

        <div  class="profile-image-container">
            <img id="profile-image-container" src="" alt="">
        </div>

        <div class="form-grid">
            <div  class="field-group">
                <label  >User ID</label>
                <input id="userid" type="text" class="readonly-input" value="" readonly>
            </div>
            <div   class="field-group">
                <label >Name</label>
                <input id="name" type="text" value="">
            </div>
            <div  class="field-group">
                <label >Email</label>
                <input id="email"  type="email" value="">
                <div class="verified-status">
                    <span class="green-check">✔</span> Verified
                </div>
            </div>
            <div  class="field-group">
                <label>Class</label>
                <input id="class"  type="text" value="">
                
            </div>
            <div  class="field-group">
                <label>Aims</label>
                <input id="subject" type="text" value="">
            </div>
            <div id="location" class="field-group">
                <label>Address</label>
                <textarea rows="2"></textarea>
            </div>
        </div>

        
    </div>
    <div class="side-content">hyy</div>
    </div>
