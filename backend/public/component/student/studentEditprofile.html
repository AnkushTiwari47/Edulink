<main  id="main-content" class="main-content">
            <header class="content-header">
                <button id="hamberg" class="hamberg">&#9776;</button>
                <div class="user-welcome">
                    <h1 class="welcome-text">Welcome Back, <span class="user-name" id="user-name">Sanjay Patel!</span></h1>
                    <p class="section-title">Edit My Profile & View Teachers</p>
                </div>
                <div class="header-right">
                    <img src="../images/myimage.png" alt="" class="user-avatar">
                </div>
            </header>

            <div class="profile-layout">
                <div class="profile-card">
                    <div class="profile-pic-container">
                        <img id="profile-pic-container" src="../images/myimage.png" alt="" class="main-avatar profilee-pic-container">
                    </div>
                    <div class="profile-info">
                        <p class="profile-name" id="profile-name">Sanjay Patel</p>
                        <p class="profile-location" id="profile-location"><span class="loc-icon">📍</span> Indore</p>
                    </div>
                    <div class="form-group">
                            
                            <input type="file" id="photoInput" name="photo" accept="image/*">
                        </div>
                    <button class="update-photo-btn">Update Photo</button>
                </div>

                <form class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="Name"> Name</label>
                            <input type="text" id="Name" name="Name" value="Sanjay patel">
                        </div>
                        
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="Email" name="email" value="sanjay.p@mail">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="Phone" name="phone" value="123-456-7890">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="Subject">subject</label>
                            <input type="text" id="Subject" name="Subject" value="Learn Python">
                        </div>
                        <div class="form-group">
                            <label for="grade">class</label>
                            <input type="text" id="grade" name="grade" value="12th Grade">
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label for="Location">Address</label>
                        <input type="text" id="Location" name="Location" placeholder="Location">
                    </div>
                    <button type="submit" class="save-changes-btn">Save Changes</button>
                </form>

                
                
            </div>
        </main>
