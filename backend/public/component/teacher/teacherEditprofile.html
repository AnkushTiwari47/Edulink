<div class="profile-container">
    
    <div class="profile-header">
        <h2>Edit Profile</h2>
    </div>

    <form class="profile-form">
        <div class="photo-section">
            <div class="photo-preview">
                <img  src="https://via.placeholder.com/100" alt="Profile Picture" id="avatar">
                <div class="camera-icon"><i class="fas fa-camera"></i></div>
            </div>
            <div class="photo-controls">
                <p class="label-text">Profile Photo</p>
                <div class="button-group">
                    <label for="photoInput" class="choosebtn">
                    
                    </label>
                    <input type="file" id="photoInput" name="photo" accept="image/*" >
                    <button  type="button" class="uploadbtn ">Upload Photo</button>
                    <button type="button" class="btn btn-link removebtn">Remove</button>
                </div>
            </div>
        </div>

        <hr>

        <section>
            <h3>Personal Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label> Name</label>
                    <input id="Name" type="text" placeholder="e.g. Ankush Tiwari">
                </div>
                <div class="form-group">
                    <label>location</label>
                    <input class="border" id="Location" type="text" placeholder="e.g. ujjain">
                </div>
                <div class="form-group small">
                    <label>Title</label>
                    <select>
                        <option>Ms.</option>
                        <option>Mr.</option>
                        <option>Dr.</option>
                        <option>Prof.</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group grow">
                    <label>Email</label>
                    <div class="input-with-icon border">
                        <input  id="Email" type="email" placeholder="email@example.com">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <div class="form-group grow">
                    <label>Phone Number</label>
                    <div class="input-with-icon">
                        <input id="Phone" type="text" placeholder="(555) 000-0000">
                        <i class="fas fa-globe"></i>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h3>Professional Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Subjects Taught</label>
                    <div class="input-with-icon">
                        <input id="Subject" type="text" placeholder="eg..English,Science">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label >Grade Levels</label>
                    <select id="grade">
                        <option>kidsPlay</option>
                        <option>1th, 2th, 3th</option>
                        <option>4th, 5th, 6th</option>
                        <option>7th, 8th, 9th</option>
                        <option>10th, 11th, 12th</option>
                        <option>Graduation</option>
                        <option>Postgraduation</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Bio/About Me</label>
                <textarea id="Bio" rows="4" placeholder="Briefly describe your teaching philosophy..."></textarea>
                <span class="char-limit">Limited to 500 characters</span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Qualifications</label>
                    <input id="Qualifications" type="text" placeholder="B.S. Mathematics, M.Ed.">
                </div>
                <div class="form-group">
                    <label>School Association</label>
                    <input id="college" type="text" placeholder="Oakwood High School">
                </div>
            </div>
        </section>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary">Cancel</button>
            <button type="button" class="btn btn-submit saveTeacherChanges">Save Changes</button>
        </div>
    </form>
</div>
