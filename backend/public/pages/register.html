<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<form class="container" id="form">
    <div class="header">
  <h1><span class="logo">🎓</span> Welcome to Edulink</h1>
  <p class="subtitle">Register as</p>
  
</div>
<div id="m">
  <select id="role">
    <option value="Select Role">Select Role</option>
    <option value="Student">Student</option>
    <option value="Teacher">Teacher</option>
  </select>


</div>
  <!-- Student Fields -->
  <div id="studentFields" style="display:none;" class="form-box">
    

    <div class="input-box">
      <span class="icon">👤</span>
      <input class="placeholder" type="text" id="studentName" placeholder="Name">
    </div>

    <div class="input-box">
      <span class="icon">📧</span>
      <input class="placeholder" type="text" id="studentEmail" placeholder="Email">
    </div>

    <div class="input-box">
      <span class="icon">🔒</span>
      <input class="placeholder" type="text" id="studentPassword" placeholder="Password">
    </div>



    
    <div class="submit-btn" type="submit"><button class="submit_register">submit </button></div>

  </div>

  <!-- Teacher Fields -->
  <div id="teacherFields" style="display:none;" class="form-box">

    <div class="input-box">
      <span class="icon">👤</span>
      <input class="placeholder" type="text" id="teacherName" placeholder="Name">
    </div>

    <div class="input-box">
      <span class="icon">📧</span>
      <input class="placeholder" type="text" id="teacherEmail" placeholder="Email">
    </div>

    <div class="input-box">
      <span class="icon">🔒</span>
      <input class="placeholder" type="text" id="teacherPassword" placeholder="Password">
    </div>

  

    
<div class="submit-btn" type="submit"><button class="submit_register">submit </button></div>
  </div>

</form>

<script src="../javascript/registerRoleControl.js"></script>
</body>
</html>
